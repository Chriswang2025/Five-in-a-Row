<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五子棋对战 - 匹配中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 
                         'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 375px;
            height: 812px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 40px;
            text-align: center;
        }

        .loading-animation {
            display: flex;
            gap: 12px;
            margin-bottom: 50px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #1890FF;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-15px);
            }
        }

        .status-card {
            background: #F5F5F5;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 40px;
            text-align: center;
        }

        .status-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }

        .queue-info {
            font-size: 14px;
            color: #8C8C8C;
        }

        .cancel-button {
            width: 200px;
            height: 48px;
            background: white;
            color: #595959;
            font-size: 16px;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cancel-button:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .scenario-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(24, 144, 255, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #1890FF;
            cursor: pointer;
            border: 1px solid #1890FF;
        }

        .scenario-switch:hover {
            background: rgba(24, 144, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="scenario-switch" onclick="toggleScenario()">切换场景</div>

        <h1 class="title" id="pageTitle">寻找对手中...</h1>
        
        <div class="loading-animation">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="status-card">
            <div class="status-text" id="statusText">正在匹配对手...</div>
            <div class="queue-info" id="queueInfo">当前排队: 0人</div>
        </div>

        <button class="cancel-button" onclick="goBack()">取消</button>
    </div>

    <script>
        let currentScenario = 1;

        function toggleScenario() {
            currentScenario = currentScenario === 1 ? 2 : 1;
            
            const title = document.getElementById('pageTitle');
            const statusText = document.getElementById('statusText');
            const queueInfo = document.getElementById('queueInfo');

            if (currentScenario === 1) {
                title.textContent = '寻找对手中...';
                statusText.textContent = '正在匹配对手...';
                queueInfo.textContent = '当前排队: 0人';
            } else {
                title.textContent = '游戏进行中,请等待...';
                statusText.textContent = '有玩家正在游戏中';
                queueInfo.textContent = '当前排队: 2人';
            }
        }

        function goBack() {
            window.location.href = 'home.html';
        }

        setTimeout(() => {
            window.location.href = 'game.html';
        }, 3000);
    </script>
</body>
</html>
